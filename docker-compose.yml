services:
  postgres:
    image: postgres:18.1
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_DB: aos_adjutant
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD", "pg_ready", "-U", "{DATABSE_USER}"]
      interval: 5s
      timeout: 5s

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
      SEQ_PASSWORD: ${SEQ_PASSWORD}
    ports:
      - 5341:80
    volumes:
      - seq-data:/data

volumes:
  postgres-data:
  seq-data:
