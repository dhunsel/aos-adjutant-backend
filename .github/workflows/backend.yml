name: backend

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend.yml'
              - 'docs/openapi.json'
            docker:
              - 'backend/Dockerfile'
              - 'backend/.dockerignore'
              - '.github/workflows/backend.yml'

  backend-ci:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AosAdjutant.slnx

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build AosAdjutant.slnx --no-restore --configuration Release

      - name: Verify OpenApi doc
        run: diff -u ../docs/openapi.json src/AosAdjutant.Api/obj/AosAdjutant.Api.json

      - name: Unit Tests
        run: dotnet test tests/AosAdjutant.UnitTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/unit

      - name: Integration Tests
        env:
          "Authentication:ClientId": ${{ secrets.Authentication_ClientId }}
          "Authentication:ClientSecret": ${{ secrets.Authentication_ClientSecret }}
        run: dotnet test tests/AosAdjutant.IntegrationTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/**/coverage.cobertura.xml
          flags: backend
          fail_ci_if_error: true

      - name: Setup Docker
        if: needs.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build image
        if: needs.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
