name: backend

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend.yml'

  build:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AosAdjutant.slnx

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build AosAdjutant.slnx --no-restore --configuration Release

      - name: Check for vulnerable packages
        run: dotnet list AosAdjutant.slnx package --vulnerable --include-transitive

      - name: Verify OpenApi doc
        run: diff -u docs/openapi.json backen/src/AosAdjutant.Api/obj/AosAdjutant.Api.json
        working-directory: ${{ github.workspace }}

      - name: Unit Tests
        run: dotnet test tests/AosAdjutant.UnitTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/unit

      - name: Integration Tests
        env:
          "Authentication:ClientId": ${{ secrets.Authentication_ClientId }}
          "Authentication:ClientSecret": ${{ secrets.Authentication_ClientSecret }}
        run: dotnet test tests/AosAdjutant.IntegrationTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/**/coverage.cobertura.xml
          flags: backend
          fail_ci_if_error: true

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
