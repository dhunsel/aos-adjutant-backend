name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore AosAdjutant.slnx

      - name: Build
        run: dotnet build AosAdjutant.slnx --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/AosAdjutant.UnitTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/unit

      - name: Integration Tests
        run: dotnet test tests/AosAdjutant.IntegrationTests --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory coverage/integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/**/coverage.cobertura.xml
          fail_ci_if_error: true
